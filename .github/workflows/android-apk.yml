name: Build APKs

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build APKs (core flavor)
        run: ./gradlew --no-daemon :app:assembleCoreDebug :app:assembleCoreRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          if-no-files-found: error
          path: |
            app/build/outputs/apk/core/debug/*.apk
            app/build/outputs/apk/core/release/*.apk
