name: Build APKs

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Setup JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v2
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build the APKs
        run: ./gradlew :app:assembleCoreDebug :app:assembleCoreRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v2
        with:
          name: core-debug-apk
          path: app/build/outputs/apk/core/debug/app-core-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v2
        with:
          name: core-release-apk
          path: app/build/outputs/apk/core/release/app-core-release.apk
